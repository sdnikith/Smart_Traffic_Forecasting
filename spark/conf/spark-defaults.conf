# Spark Configuration for Traffic Intelligence Platform

# Core Spark Settings
spark.app.name=traffic-intelligence-platform
spark.master=spark://spark-master:7077
spark.submit.deployMode=cluster
spark.driver.memory=2g
spark.executor.memory=4g
spark.executor.cores=4
spark.executor.instances=4

# Dynamic Allocation
spark.dynamicAllocation.enabled=true
spark.dynamicAllocation.minExecutors=2
spark.dynamicAllocation.maxExecutors=8
spark.dynamicAllocation.initialExecutors=4
spark.dynamicAllocation.schedulerBacklogTimeout=1s
spark.dynamicAllocation.sustainedSchedulerBacklogTimeout=60s

# Streaming Configuration
spark.streaming.backpressure.enabled=true
spark.streaming.backpressure.initialRate=1000
spark.streaming.stopGracefullyOnShutdown=true
spark.streaming.unpersist=false
spark.streaming.blockInterval=200ms
spark.streaming.receiver.maxRate=1000
spark.streaming.kafka.maxRatePerPartition=500
spark.streaming.receiver.writeAheadLog.enable=true

# Checkpointing
spark.streaming.checkpointDir=/tmp/checkpoint
spark.streaming.stopGracefullyOnShutdown=true
spark.streaming.unpersist=false

# Delta Lake Configuration
spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog

# Delta Lake Optimizations
spark.databricks.delta.retentionDurationCheck.enabled=false
spark.databricks.delta.autoCompact.enabled=true
spark.databricks.delta.optimizeWrite.enabled=true
spark.databricks.delta.merge.repartition.enabled=true
spark.databricks.delta.merge.optimizeWrite.enabled=true

# Time Travel and Schema Evolution
spark.databricks.delta.timeTravel.enabled=true
spark.databricks.delta.schema.autoMerge.enabled=true
spark.databricks.delta.schema.validation.enabled=true

# Checkpointing and Versioning
spark.databricks.delta.checkpoint.writeStatsAsStructs=true
spark.databricks.delta.checkpoint.writeStatsAsJson=true
spark.databricks.delta.snapshotPartitions=2

# Kafka Integration
spark.kafka.consumer.poll.timeout.ms=30000
spark.kafka.consumer.session.timeout.ms=30000
spark.kafka.consumer.heartbeat.interval.ms=10000
spark.kafka.consumer.max.poll.records=1000
spark.kafka.consumer.request.timeout.ms=40000
spark.kafka.consumer.auto.offset.reset=latest
spark.kafka.consumer.enable.auto.commit=true
spark.kafka.consumer.auto.commit.interval.ms=1000

# Performance Tuning
spark.sql.adaptive.enabled=true
spark.sql.adaptive.coalescePartitions.enabled=true
spark.sql.adaptive.skewJoin.enabled=true
spark.sql.adaptive.localShuffleReader.enabled=true
spark.sql.adaptive.advisoryPartitionSizeInBytes=128MB
spark.sql.adaptive.coalescePartitions.minPartitionSize=1MB

# Shuffle Configuration
spark.sql.shuffle.partitions=200
spark.shuffle.compress=true
spark.shuffle.spill.compress=true
spark.shuffle.file.buffer=32k
spark.shuffle.io.maxRetries=3
spark.shuffle.io.retryWait=5s

# Memory Management
spark.memory.fraction=0.6
spark.memory.storageFraction=0.5
spark.memory.offHeap.enabled=true
spark.memory.offHeap.size=2g
spark.storage.memoryFraction=0.5
spark.storage.memoryMapThreshold=1024

# Garbage Collection
spark.executor.extraJavaOptions=-XX:+UseG1GC -XX:+UseStringDeduplication -XX:+PrintGCDetails -XX:+PrintGCTimeStamps
spark.driver.extraJavaOptions=-XX:+UseG1GC -XX:+UseStringDeduplication -XX:+PrintGCDetails -XX:+PrintGCTimeStamps

# Serialization
spark.serializer=org.apache.spark.serializer.KryoSerializer
spark.kryo.registrationRequired=true
spark.kryo.buffer=64k
spark.kryo.referenceTracking=true

# Network Configuration
spark.network.timeout=120s
spark.rpc.askTimeout=120s
spark.rpc.lookupTimeout=60s
spark.connection.timeout=120s

# UI and Monitoring
spark.ui.enabled=true
spark.ui.port=8083
spark.ui.killEnabled=true
spark.ui.threadInfo.maxLines=100
spark.ui.retainedJobs=1000
spark.ui.retainedStages=1000
spark.ui.retainedTasks=1000
spark.ui.retainedBatches=1000

# Metrics
spark.metrics.conf=metrics.properties
spark.metrics.namespace=traffic-platform
spark.metrics.appName=traffic-intelligence

# SQL Configuration
spark.sql.autoBroadcastJoinThreshold=10MB
spark.sql.broadcastTimeout=300s
spark.sql.crossJoin.enabled=true
spark.sql.parquet.enableVectorizedReader=true
spark.sql.parquet.enableVectorizedWriter=true
spark.sql.parquet.compression.codec=snappy
spark.sql.parquet.binaryAsString=true

# Hive Configuration (if needed)
spark.sql.catalogImplementation=hive
spark.sql.hive.convertMetastoreParquet=false
spark.sql.hive.manageFilesourcePartitions=false

# Security
spark.authenticate=false
spark.network.crypto.enabled=false
spark.ssl.enabled=false
spark.ui.allowProxy=false

# Logging
spark.eventLog.enabled=true
spark.eventLog.dir=/tmp/spark-events
spark.eventLog.compress=true
spark.history.fs.logDirectory=/tmp/spark-events
spark.history.fs.update.interval=10s

# Application Specific
spark.traffic.platform.checkpoint.location=/tmp/traffic-checkpoint
spark.traffic.platform.batch.duration=5s
spark.traffic.platform.watermark.delay=1min
spark.traffic.platform.maxOffsetsPerTrigger=1000

# Error Handling
spark.task.maxFailures=4
spark.stage.maxConsecutiveAttempts=4
spark.speculation=true
spark.speculation.quantile=0.75
spark.speculation.multiplier=1.5

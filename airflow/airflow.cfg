version: '3'

# Airflow configuration for Traffic Platform
core:
  executor: LocalExecutor
  sql_alchemy_conn_id: airflow_db
  parallelism: 4
  dags_folder: /opt/airflow/dags
  plugins_folder: /opt/airflow/plugins
  load_examples: False
  
  # Security settings
  security:
    secure_mode: False
    encrypt_s3_logs: False
    
  # Performance settings
  dagbag_import_timeout: 30
  task_heartbeat_misgrace_threshold: 60

# Logging configuration
logging:
  colored_console_log: True
  log_level: INFO
  remote_logging: False
  remote_log_conn_id: ''
  remote_base_log_folder: ''
  encrypt_s3_logs: False
  s3_log_folder: ''
  
  # Log format
  log_format: "[%%(asctime)s] {%%(filename)s}:%%(lineno)d} %%(levelname)s - %%(message)s"
  log_filename_template: "{{ ti.dag_id }}/{{ ti.task_id }}/{{ ts_nodash }}/{{ try_number }}.log"
  
  # File processing
  log_processor_filename_template: "{{ filename }}.log"

# Scheduler settings
scheduler:
  # DAG scheduling
  max_threads: 4
  use_job_schedule: True
  run_duration_job: airflow.jobs.run_duration_job.RunDurationJob
  
  # Task scheduling
  min_file_process_interval: 5
  dag_dir_list_interval: 300
  processor_poll_interval: 1
  max_tis_per_query: 256
  
  # Pools
  max_threads: 4
  unmet_depends_on_past_threshold: 600
  
  # Scheduler health
  scheduler_health_check_threshold: 70
  scheduler_zombie_task_threshold: 300
  
  # DAG parsing
  dag_discovery_safe_mode: True
  print_stats_interval: 30

# Webserver settings
webserver:
  # Basic settings
  expose_config: True
  auth_backend: airflow.api.auth.backend.basic_auth
  auth_backend_username: admin
  auth_backend_password: admin
  
  # Security
  enable_proxy_fix: True
  cookie_secret: your-secret-key-here
  
  # Performance
  workers: 4
  worker_class: sync
  worker_refresh_interval: 30
  worker_log_server_port: 8793
  
  # UI settings
  expose_config: True
  hide_sensitive_var_fields: True
  rbac: False

# Database settings
database:
  # Connection
  sql_alchemy_conn_id: airflow_db
  sql_alchemy_pool_enabled: True
  sql_engine_pool_size: 5
  sql_engine_pool_recycle: 3600
  
  # Performance
  sql_alchemy_schema: ""
  max_overflow: 10
  
  # Migration
  load_default_connections: False
  migrate_database: True

# Email settings
email:
  email_backend: airflow.utils.email.send_email_smtp
  email_conn_id: smtp_default
  
  # SMTP settings
  smtp_host: smtp.gmail.com
  smtp_port: 587
  smtp_ssl: False
  smtp_starttls: True
  
  # Authentication
  smtp_user: your-email@gmail.com
  smtp_password: your-app-password
  smtp_mail_from: airflow@company.com
  
  # Email settings
  default_email_on_retry: False
  default_email_on_failure: True
  email_timeout: 30

# Kubernetes settings (if using Kubernetes)
kubernetes:
  # Cluster settings
  worker_container_repository: apache/airflow
  worker_container_tag: 2.3.4
  namespace: airflow
  
  # Pod settings
  multi_namespace_mode: False
  in_cluster: True
  
  # Service account
  service_account_name: airflow
  service_account_name_space: default
  
  # Worker settings
  worker_pods_creation_batch_size: 1
  kubernetes_client_request_timeout: 120
  
  # Resources
  worker_resources:
    request_cpu: 200m
    request_memory: 256Mi
    limit_cpu: 1000m
    limit_memory: 1Gi
  
  # Affinity
  affinity:
    pod_affinity:
      required_during_scheduling_ignored_during_execution:
        - label_selector:
            match_expressions:
              - key: app
                operator: In
                values: ["airflow-worker"]
  
  # Tolerations
  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "airflow-worker"
      effect: "NoSchedule"

# Celery settings (if using Celery)
celery:
  # Broker settings
  celery_broker_url: redis://localhost:6379/0
  celery_result_backend: db+postgresql://airflow:airflow@localhost:5432/airflow
  
  # Worker settings
  celery_concurrency: 16
  celery_task_always_eager: False
  celery_task_eager_propagates: True
  
  # Performance
  worker_prefetch_multiplier: 1
  worker_disable_rate_limits: False
  
  # Queue settings
  celery_queue_purge_interval: 0.0
  celery_default_queue: default

# Docker settings (if using Docker)
docker:
  # Registry settings
  docker_image: apache/airflow:2.3.4
  docker_url: unix://var/run/docker.sock
  
  # Container settings
  docker_container_user: "50000:50000"
  docker_network: bridge
  
  # Volume settings
  docker_host_app_dir: /opt/airflow
  docker_host_tmp_dir: /tmp/airflow
  
  # Environment
  docker_env_file: /opt/airflow/.env
  docker_mount_tmp_dir: True

# Secrets backend (if using external secrets)
secrets:
  backend: airflow.providers.google.cloud.secrets.secret_manager.CloudSecretManagerBackend
  backend_kwargs:
    project_id: your-gcp-project
    secrets_prefix: airflow-connections-
  
  # Vault settings (alternative)
  backend: airflow.providers.hashicorp.vault.secrets.vault.VaultBackend
  backend_kwargs:
    url: http://vault:8200
    token: your-vault-token
    mount_point: airflow
    secret_path: connections

# Monitoring and metrics
metrics:
  # StatsD
  statsd_on: False
  statsd_host: localhost
  statsd_port: 8125
  statsd_prefix: airflow
  
  # Prometheus
  statsd_on: False
  statsd_type: prometheus
  statsd_host: localhost
  statsd_port: 9108
  
  # New Relic
  statsd_on: False
  statsd_type: statsd
  statsd_host: collector.newrelic.com
  statsd_port: 8125

# Connection types
connections:
  # Snowflake
  snowflake_default:
    conn_type: snowflake
    conn_host: your_account.snowflakecomputing.com
    conn_login: your_username
    conn_password: your_password
    conn_extra: {"account": "your_account", "warehouse": "TRAFFIC_TRANSFORM_WH", "database": "TRAFFIC_DB", "schema": "ANALYTICS"}
  
  # Kafka
  kafka_default:
    conn_type: kafka
    conn_host: localhost:9092
    conn_extra: {"bootstrap.servers": "localhost:9092"}
  
  # S3
  aws_default:
    conn_type: aws
    conn_host: s3.amazonaws.com
    conn_login: your_aws_access_key
    conn_password: your_aws_secret_key
    conn_extra: {"region": "us-east-1"}
  
  # PostgreSQL
  postgres_default:
    conn_type: postgres
    conn_host: localhost
    conn_schema: postgres
    conn_login: postgres
    conn_password: postgres
    conn_port: 5432
    conn_extra: {"database": "airflow"}

# Variables (can be set in Airflow UI)
variables:
  # Kafka configuration
  KAFKA_BOOTSTRAP_SERVERS: "localhost:9092,localhost:9093"
  SCHEMA_REGISTRY_URL: "http://localhost:8081"
  
  # Snowflake configuration
  SNOWFLAKE_ACCOUNT: "your_account"
  SNOWFLAKE_USER: "your_username"
  SNOWFLAKE_PASSWORD: "your_password"
  
  # S3 configuration
  S3_BUCKET: "traffic-platform-lake"
  
  # API configuration
  WEATHER_API_KEY: "your_openweather_api_key"
  WEATHER_MOCK: "false"
  
  # Monitoring thresholds
  FRESHNESS_THRESHOLD_HOURS: 2
  ANOMALY_THRESHOLD_STD: 2.5
  SCHEMA_DRIFT_CHECK_ENABLED: "true"

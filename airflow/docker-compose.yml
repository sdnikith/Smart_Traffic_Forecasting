version: '3.8.2'
services:
  # PostgreSQL database
  postgres:
    image: postgres:13
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_HOST: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traffic-platform-network

  # Redis (for Celery broker)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traffic-platform-network

  # Airflow webserver
  airflow-webserver:
    image: apache/airflow:2.3.4
    depends_on:
      - postgres
      - redis
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN_ID: postgres_default
      AIRFLOW__CORE__SQL_ALCHEMY_CONN_STRING: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: your-fernet-key-here
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: your-secret-key-here
      AIRFLOW__WEBSERVER__EXECUTE_TASKS_NEWEST_FIRST: "true"
      AIRFLOW__WEBSERVER__RBAC: "false"
      AIRFLOW__WEBSERVER__AUTH_BACKEND: airflow.api.auth.backend.basic_auth
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: >
      bash -c "
        airflow users create -r Admin -u admin -e admin@example.com -f admin -p admin || true &&
        airflow db upgrade &&
        airflow webserver
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - traffic-platform-network

  # Airflow scheduler
  airflow-scheduler:
    image: apache/airflow:2.3.4
    depends_on:
      - postgres
      - redis
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN_ID: postgres_default
      AIRFLOW__CORE__SQL_ALCHEMY_CONN_STRING: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 30
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./logs:/opt/airflow/logs
    command: >
      bash -c "
        airflow db upgrade &&
        airflow scheduler
      "
    networks:
      - traffic-platform-network

  # Airflow worker
  airflow-worker:
    image: apache/airflow:2.3.4
    depends_on:
      - postgres
      - redis
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN_ID: postgres_default
      AIRFLOW__CORE__SQL_ALCHEMY_CONN_STRING: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__WORKER__LOG_FILE: /opt/airflow/logs/worker.log
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./logs:/opt/airflow/logs
    command: >
      bash -c "
        airflow celery worker
      "
    deploy:
      replicas: 2
    networks:
      - traffic-platform-network

  # Airflow flower (Celery monitoring)
  airflow-flower:
    image: mher/flower:0.9.7
    depends_on:
      - redis
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_BASIC_AUTH: admin:admin
    ports:
      - "5555:5555"
    networks:
      - traffic-platform-network

  # Spark master (for DAG execution)
  spark-master:
    image: bitnami/spark:3.3
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_MASTER_HOST: spark-master
    ports:
      - "8080:8080"  # Master web UI
      - "7077:7077"  # Master RPC
    volumes:
      - spark_data:/opt/bitnami/spark
    networks:
      - traffic-platform-network

  # Spark worker
  spark-worker:
    image: bitnami/spark:3.3
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    volumes:
      - spark_data:/opt/bitnami/spark
    deploy:
      replicas: 3
    networks:
      - traffic-platform-network

  # Jupyter notebook (for development)
  jupyter:
    image: jupyter/pyspark-notebook:latest
    environment:
      SPARK_MASTER: spark://spark-master:7077
      JUPYTER_ENABLE_LAB: "yes"
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - spark_data:/opt/spark
    networks:
      - traffic-platform-network

networks:
  traffic-platform-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  spark_data:
    driver: local
